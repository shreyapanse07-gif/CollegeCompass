<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Detail — CollegeCompass</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #00C47D;
      --green-glow: rgba(0,196,125,0.15);
      --navy: #050F1C;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #F0EDE6;
      --muted: rgba(240,237,230,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(0,196,125,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      backdrop-filter: blur(24px);
      background: rgba(5,15,28,0.85);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-link:hover { color: var(--green); }

    /* HERO SECTION */
    .detail-hero {
      border-bottom: 1px solid var(--border);
      padding: 48px 32px;
      position: relative;
      z-index: 1;
      overflow: hidden;
      animation: fadeUp 0.6s ease forwards;
     
    }

    .detail-hero::before {
      content: '';
      position: absolute;
      top: -100px; left: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: var(--green-glow);
      filter: blur(80px);
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      gap: 24px;
    }

    .hero-logo {
      width: 72px; height: 72px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .logo-iit { background: rgba(24,95,165,0.2); color: #5BA4F5; border-color: rgba(24,95,165,0.3); }
    .logo-iim { background: rgba(133,79,11,0.2); color: #F5BD5B; border-color: rgba(133,79,11,0.3); }
    .logo-nit { background: rgba(59,109,17,0.2); color: #7DC85B; border-color: rgba(59,109,17,0.3); }
    .logo-iiit { background: rgba(83,74,183,0.2); color: #A09CF5; border-color: rgba(83,74,183,0.3); }
    .logo-bits { background: rgba(83,74,183,0.2); color: #A09CF5; border-color: rgba(83,74,183,0.3); }
    .logo-private { background: rgba(153,60,29,0.2); color: #F5855B; border-color: rgba(153,60,29,0.3); }
    .logo-abroad { background: rgba(194,24,91,0.2); color: #F56BAA; border-color: rgba(194,24,91,0.3); }
    .logo-default { background: rgba(255,255,255,0.06); color: var(--muted); }

    .hero-info { flex: 1; }

    .hero-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
    }

    .badge-type { background: rgba(255,255,255,0.05); color: var(--muted); border-color: var(--border); }
    .badge-nirf { background: rgba(0,196,125,0.1); color: var(--green); border-color: rgba(0,196,125,0.2); }
    .badge-abroad { background: rgba(194,24,91,0.1); color: #F56BAA; border-color: rgba(194,24,91,0.2); }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .hero-location {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .hero-quick-stats {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .quick-stat .val {
      font-size: 22px;
      font-weight: 500;
      color: var(--green);
      font-family: 'Playfair Display', serif;
    }

    .quick-stat .lbl {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    .stat-divider {
      width: 1px;
      background: var(--border);
      height: 40px;
      align-self: center;
    }

    /* CONTENT GRID */
    .detail-content {
      max-width: 1000px;
      margin: 32px auto;
      padding: 0 32px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s, transform 0.5s;
    }

    .section-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .section-card:hover {
      border-color: rgba(255,255,255,0.12);
    }

    .section-card h2 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* Stat boxes */
    .stat-boxes {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: all 0.2s;
    }

    .stat-box:hover {
      background: rgba(0,196,125,0.05);
      border-color: rgba(0,196,125,0.2);
    }

    .stat-box .box-val {
      font-size: 22px;
      font-weight: 500;
      color: var(--green);
      font-family: 'Playfair Display', serif;
      display: block;
    }

    .stat-box .box-lbl {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Info rows */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .info-row:last-child { border-bottom: none; }
    .info-row .key { color: var(--muted); }
    .info-row .val { font-weight: 400; color: var(--text); }
    .info-row .val a { color: var(--green); text-decoration: none; }
    .info-row .val a:hover { text-decoration: underline; }

    .yes { color: var(--green); }
    .no { color: rgba(255,100,100,0.7); }

    /* Courses */
    .courses-wrap { display: flex; flex-wrap: wrap; gap: 8px; }

    .course-tag {
      background: rgba(0,196,125,0.08);
      border: 1px solid rgba(0,196,125,0.2);
      color: #5DCAA5;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      transition: all 0.2s;
    }

    .course-tag:hover {
      background: rgba(0,196,125,0.14);
    }

    /* About */
    .about-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.8;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loading {
      text-align: center;
      padding: 80px;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .detail-content { grid-template-columns: 1fr; padding: 0 16px; }
      .hero-inner { flex-direction: column; }
      .hero-quick-stats { gap: 16px; }
      .stat-divider { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="landing.html" class="logo">
      <div class="logo-dot"></div>
      CollegeCompass
    </a>
    <a href="index.html" class="back-link">← Back to results</a>
  </nav>

  <div id="detail-root">
    <div class="loading">Loading college details...</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    function getLogoClass(type) {
      return { IIT:'logo-iit', IIM:'logo-iim', NIT:'logo-nit', IIIT:'logo-iiit', deemed:'logo-bits', private:'logo-private', abroad:'logo-abroad', state:'logo-default' }[type] || 'logo-default';
    }

    function getAbbr(name, type) {
      if (['IIT','IIM','NIT','IIIT'].includes(type)) return type;
      return name.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
    }

    function formatFees(f) {
      if (!f) return '—';
      return '₹' + Number(f).toLocaleString('en-IN');
    }

    async function loadDetail() {
      const root = document.getElementById('detail-root');
      if (!id) { window.location.href = 'index.html'; return; }

      try {
        const res = await fetch(`http://localhost:3000/colleges/${id}`);
        const data = await res.json();
        const c = data.data;

        document.title = `${c.name} — CollegeCompass`;

        const logo = getLogoClass(c.type);
        const abbr = getAbbr(c.name, c.type);
        const p = c.placements[0] || {};
        const f = c.factors || {};

        root.innerHTML = `
          <div class="detail-hero">
            <div class="hero-inner">
              <div class="hero-logo ${logo}">${abbr}</div>
              <div class="hero-info">
                <div class="hero-badges">
                  <span class="badge badge-type">${c.type.toUpperCase()}</span>
                  ${c.nirf_rank ? `<span class="badge badge-nirf">NIRF #${c.nirf_rank}</span>` : ''}
                  ${c.country !== 'India' ? `<span class="badge badge-abroad">${c.country}</span>` : ''}
                </div>
                <h1 class="hero-name">${c.name}</h1>
                <div class="hero-location">📍 ${[c.city, c.state, c.country].filter(Boolean).join(', ')}</div>
                <div class="hero-quick-stats">
                  ${p.avg_package_lpa ? `
                    <div class="quick-stat">
                      <div class="val">₹${p.avg_package_lpa}L</div>
                      <div class="lbl">Avg. Package</div>
                    </div>
                    <div class="stat-divider"></div>
                  ` : ''}
                  ${p.placement_percentage ? `
                    <div class="quick-stat">
                      <div class="val">${p.placement_percentage}%</div>
                      <div class="lbl">Placed</div>
                    </div>
                    <div class="stat-divider"></div>
                  ` : ''}
                  ${c.fees_per_year ? `
                    <div class="quick-stat">
                      <div class="val">${formatFees(c.fees_per_year)}</div>
                      <div class="lbl">Fees/year</div>
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          </div>

          <div class="detail-content">
            <div class="left-col">

              <div class="section-card">
                <h2>About</h2>
                <p class="about-text">${c.about || 'No description available for this college.'}</p>
              </div>

              ${p.avg_package_lpa ? `
              <div class="section-card">
                <h2>Placements 2024</h2>
                <div class="stat-boxes">
                  <div class="stat-box">
                    <span class="box-val">₹${p.avg_package_lpa}L</span>
                    <span class="box-lbl">Average Package</span>
                  </div>
                  <div class="stat-box">
                    <span class="box-val">₹${p.highest_package_lpa}L</span>
                    <span class="box-lbl">Highest Package</span>
                  </div>
                  <div class="stat-box">
                    <span class="box-val">${p.placement_percentage}%</span>
                    <span class="box-lbl">Placement Rate</span>
                  </div>
                  <div class="stat-box">
                    <span class="box-val">${p.year}</span>
                    <span class="box-lbl">Data Year</span>
                  </div>
                </div>
              </div>
              ` : ''}

              ${c.cutoffs.length > 0 ? `
              <div class="section-card">
                <h2>Entrance Cutoffs</h2>
                ${c.cutoffs.map(ct => `
                  <div class="info-row">
                    <span class="key">${ct.exam_name} (${ct.year})</span>
                    <span class="val">${ct.min_percentile} – ${ct.max_percentile} percentile</span>
                  </div>
                `).join('')}
              </div>
              ` : ''}

              ${c.courses.length > 0 ? `
              <div class="section-card">
                <h2>Courses Offered</h2>
                <div class="courses-wrap">
                  ${c.courses.map(co => `
                    <span class="course-tag">${co.name} · ${co.duration_years}yr</span>
                  `).join('')}
                </div>
              </div>
              ` : ''}

            </div>

            <div class="right-col">

              <div class="section-card">
                <h2>Quick Info</h2>
                <div class="info-row"><span class="key">Type</span><span class="val">${c.type.toUpperCase()}</span></div>
                <div class="info-row"><span class="key">Location</span><span class="val">${c.city}, ${c.country}</span></div>
                <div class="info-row"><span class="key">Fees / year</span><span class="val">${formatFees(c.fees_per_year)}</span></div>
                ${c.nirf_rank ? `<div class="info-row"><span class="key">NIRF Rank</span><span class="val">#${c.nirf_rank}</span></div>` : ''}
                ${c.website ? `<div class="info-row"><span class="key">Website</span><span class="val"><a href="https://${c.website}" target="_blank">${c.website} ↗</a></span></div>` : ''}
              </div>

              <div class="section-card">
                <h2>Campus</h2>
                <div class="info-row">
                  <span class="key">Hostel</span>
                  <span class="val ${f.has_hostel ? 'yes' : 'no'}">${f.has_hostel ? '✓ Available' : '✗ Not Available'}</span>
                </div>
                <div class="info-row">
                  <span class="key">Intl. Exchange</span>
                  <span class="val ${f.has_international_exchange ? 'yes' : 'no'}">${f.has_international_exchange ? '✓ Available' : '✗ Not Available'}</span>
                </div>
                ${f.research_score ? `<div class="info-row"><span class="key">Research Score</span><span class="val">${f.research_score}/100</span></div>` : ''}
                ${f.campus_size_acres ? `<div class="info-row"><span class="key">Campus</span><span class="val">${f.campus_size_acres} acres</span></div>` : ''}
              </div>

            </div>
          </div>
        `;

        // Animate section cards on scroll
        const cards = document.querySelectorAll('.section-card');
        const observer = new IntersectionObserver(entries => {
          entries.forEach((entry, i) => {
            if (entry.isIntersecting) {
              setTimeout(() => entry.target.classList.add('visible'), i * 80);
            }
          });
        }, { threshold: 0.1 });
        cards.forEach(card => observer.observe(card));

      } catch(e) {
        root.innerHTML = `<div style="text-align:center;padding:80px;color:var(--muted)">
          <div style="font-size:40px;margin-bottom:16px">⚠️</div>
          <div style="font-size:20px;margin-bottom:8px;color:var(--text)">Could not load college</div>
          <div>Make sure your server is running</div>
        </div>`;
      }
    }

    loadDetail();
  </script>
</body>
</html>
